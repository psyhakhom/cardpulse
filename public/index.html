<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>CardPulse</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--s1:#13131a;--s2:#1a1a24;--bd:#1e1e2e;--ac:#00e676;--a2:#4fc3f7;--a3:#ff4444;--tx:#f0f0f0;--mu:#888;--gn:#00e676;--rd:#ff4444;--gold:#ffd700;--font-d:'Bebas Neue',sans-serif;--font-b:'DM Sans',sans-serif}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--tx);font-family:var(--font-b);line-height:1.5;-webkit-font-smoothing:antialiased}
#app{max-width:480px;margin:0 auto;display:flex;flex-direction:column;min-height:100vh}
/* header */
header{padding:16px 20px 12px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--bd);background:var(--bg);position:sticky;top:0;z-index:10}
.logo{font-family:var(--font-d);font-size:28px;font-weight:400;letter-spacing:1.5px}.logo b{color:var(--ac)}
.logo-sub{font-size:11px;color:var(--mu);margin-top:0;letter-spacing:.02em}
.htag{font-size:10px;color:var(--ac);background:rgba(0,230,118,.08);border:1px solid rgba(0,230,118,.2);padding:4px 10px;border-radius:24px;font-weight:600}
/* tabs */
.tabs{display:flex;border-bottom:1px solid var(--bd);background:var(--bg);position:sticky;top:57px;z-index:10}
.tab{flex:1;padding:14px 2px;font-size:13px;font-weight:500;letter-spacing:.03em;background:none;border:none;color:var(--mu);cursor:pointer;border-bottom:3px solid transparent;text-transform:uppercase;min-height:52px;font-family:var(--font-b);transition:color .2s}
.tab.on{color:var(--ac);border-bottom-color:var(--ac);font-weight:700}
.pane{padding:16px 20px 40px;display:none}.pane.on{display:block}
/* search input */
.sw{position:relative;margin-bottom:12px}
.si{width:100%;background:var(--s1);border:1.5px solid var(--bd);border-radius:26px;padding:14px 76px 14px 20px;font-size:16px;color:var(--tx);outline:none;min-height:52px;font-family:var(--font-b);transition:border-color .2s;text-overflow:ellipsis;white-space:nowrap;overflow:hidden}
.si:focus{border-color:var(--ac)}.si::placeholder{color:#555;font-size:14px}
.scl{position:absolute;right:52px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--mu);font-size:20px;line-height:1;cursor:pointer;padding:6px 8px;display:none}
.scl.vis{display:block}
.sb{position:absolute;right:6px;top:50%;transform:translateY(-50%);background:var(--ac);border:none;border-radius:50%;width:40px;height:40px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:transform .15s}
.sb:active{transform:translateY(-50%) scale(.92)}
.sb svg{width:18px;height:18px}
/* autocomplete dropdown */
.ac-drop{position:absolute;top:calc(100% + 6px);left:0;right:0;background:var(--s1);border:1px solid var(--bd);border-radius:16px;z-index:200;overflow:hidden;display:none;box-shadow:0 8px 32px rgba(0,0,0,.6);max-height:520px;overflow-y:auto}
.ac-drop.open{display:block}
.ac-load{display:flex;align-items:center;justify-content:center;padding:24px 0;gap:10px;color:var(--mu);font-size:12px}
.ac-load .ac-dot{width:8px;height:8px;border-radius:50%;background:var(--ac);animation:acPulse .8s ease-in-out infinite alternate}
.ac-load .ac-dot:nth-child(2){animation-delay:.15s}.ac-load .ac-dot:nth-child(3){animation-delay:.3s}
@keyframes acPulse{from{opacity:.2;transform:scale(.8)}to{opacity:1;transform:scale(1.1)}}
.ac-item{display:flex;align-items:center;padding:12px 16px;cursor:pointer;gap:12px;border-bottom:1px solid var(--bd);min-height:72px;transition:background .15s}
.ac-item:last-of-type{border-bottom:none}
.ac-item:hover,.ac-item.sel{background:var(--s2)}
.ac-img{width:64px;height:90px;object-fit:contain;border-radius:6px;flex-shrink:0;background:var(--s2)}
.ac-name{font-size:17px!important;font-weight:600!important;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-family:var(--font-b)!important}
.ac-sub{font-size:13px!important;color:#999!important;margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-family:var(--font-b)!important}
.ac-badge{font-size:11px;font-weight:700;padding:3px 8px;border-radius:12px;white-space:nowrap;flex-shrink:0;display:flex;align-items:center;gap:3px;border:none}
.ac-badge.pkm{background:#ffcb05;color:#000}.ac-badge.mtg{background:#cba135;color:#000}.ac-badge.dbs{background:#ff6b35;color:#000}.ac-badge.dir{background:var(--s2);color:var(--mu);border:1px solid var(--bd)}
.ac-attr{font-size:10px;color:var(--mu);padding:6px 16px 7px;text-align:right}
/* filter chips */
.fr{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap;align-items:center}
.fl{font-size:11px;color:var(--mu);min-width:30px;font-weight:600;text-transform:uppercase;letter-spacing:.04em}
.fg{display:flex;gap:5px;flex-wrap:wrap}
.ch{font-size:13px;padding:10px 16px;background:var(--s1);border:1.5px solid var(--bd);border-radius:24px;color:var(--mu);cursor:pointer;white-space:nowrap;min-height:44px;display:flex;align-items:center;font-family:var(--font-b);font-weight:500;transition:all .15s}
.ch.on{background:var(--ac);border-color:var(--ac);color:#000;font-weight:700}
.ch.lon{background:var(--a2);border-color:var(--a2);color:#000;font-weight:700}
/* collapsible filters */
.filter-toggle{display:flex;align-items:center;gap:6px;background:none;border:1px solid var(--bd);border-radius:24px;padding:8px 16px;color:var(--mu);font-size:13px;font-family:var(--font-b);font-weight:500;cursor:pointer;margin-bottom:10px;transition:all .15s}
.filter-toggle:hover{border-color:var(--ac);color:var(--tx)}
.filter-toggle .ft-arrow{transition:transform .2s;font-size:10px}
.filter-collapse{display:none;animation:fu .2s ease}
.filter-collapse.filters-open{display:block}
/* loading */
.ld{display:flex;flex-direction:column;align-items:center;padding:48px 0;gap:14px}
.sp{width:36px;height:36px;border:2.5px solid var(--bd);border-top-color:var(--ac);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.ld p{font-size:13px;color:var(--mu)}
/* result card */
.rc{background:var(--s1);border:1px solid var(--bd);border-radius:16px;overflow:hidden;margin-bottom:14px;animation:fu .25s ease}
@keyframes fu{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.rh{position:relative;background:var(--s2);display:flex;align-items:center;justify-content:center;min-height:280px;overflow:hidden}
.rh img{width:100%;max-height:360px;object-fit:contain;display:block;transition:opacity .3s}
.rhl{position:absolute;bottom:8px;right:10px;font-size:10px;color:var(--mu);background:rgba(0,0,0,.7);padding:4px 10px;border-radius:8px;backdrop-filter:blur(4px);font-weight:500}
.shim{position:absolute;inset:0;background:linear-gradient(90deg,var(--s2) 25%,var(--bd) 50%,var(--s2) 75%);background-size:200% 100%;animation:sh 1.4s infinite}
@keyframes sh{0%{background-position:200% 0}100%{background-position:-200% 0}}
.rb{padding:20px}
.rt{font-size:20px;font-weight:700;margin-bottom:4px;line-height:1.4;word-break:break-word;font-family:var(--font-b)}
.rm{font-size:12px;color:var(--mu);margin-bottom:20px}
/* price display */
.pg{display:flex;flex-direction:column;align-items:center;margin-bottom:20px;padding:8px 0}
.pb{background:none;border-radius:0;padding:0;text-align:center}
.pb .pl{font-size:11px;color:#666;text-transform:uppercase;letter-spacing:.15em;margin-bottom:0;font-weight:500}
.pb .pv{font-family:var(--font-d);font-size:24px;font-weight:400;letter-spacing:.5px}
.pv.lo{color:#888;font-size:18px}.pv.av{color:var(--ac);font-size:56px;line-height:1.1}.pv.hi{color:#888;font-size:18px}
.pg-range{display:flex;align-items:center;justify-content:center;gap:20px;margin-top:8px}
.pg-range-end{text-align:center}
.pg-range-end .pl{font-size:9px;color:#555;text-transform:uppercase;letter-spacing:.12em;margin-bottom:2px;font-weight:600}
.pg-range-end .pv{font-family:var(--font-d);font-size:18px;letter-spacing:.5px;color:#888}
.pg-range-sep{color:#333;font-size:14px;letter-spacing:2px;margin-top:14px}
/* confidence — simplified dot + word */
.crw{display:flex;align-items:center;gap:12px;background:var(--s2);border-radius:12px;padding:14px 16px;margin-top:16px;margin-bottom:16px}
.cr{position:relative;width:12px;height:12px;flex-shrink:0}
.cr svg{display:none}
.cr .cl{position:static;display:none}
.cr::after{content:'';position:absolute;inset:0;border-radius:50%;background:currentColor}
.crt{font-size:15px;font-weight:600;margin-bottom:0}
.crs{font-size:11px;color:var(--mu);line-height:1.5}
/* source breakdown — collapsible */
.wh{font-size:11px;color:var(--mu);text-transform:uppercase;letter-spacing:.07em;margin-bottom:8px;display:flex;justify-content:space-between;cursor:pointer;padding:8px 0;align-items:center}
.wh::after{content:'▾';font-size:10px;margin-left:8px}
.wh .wa{font-size:12px;color:var(--ac);text-transform:none;font-weight:600}
.wr{margin-bottom:6px}
.wrt{display:flex;justify-content:space-between;align-items:center;margin-bottom:3px}
.wsn{font-size:12px;color:var(--tx);display:flex;align-items:center;gap:6px}
.wsp{font-size:11px;color:var(--mu);display:flex;align-items:center;gap:6px}
.wpc{font-size:11px;color:var(--mu);min-width:30px;text-align:right}
.wtr{height:3px;background:var(--bd);border-radius:3px;overflow:hidden}
.wf{height:100%;border-radius:3px;transition:width .5s}
.ndb{font-size:10px;color:var(--mu);background:var(--s2);border:1px solid var(--bd);padding:2px 6px;border-radius:6px;margin-left:4px}
/* trends */
.tr{display:flex;gap:8px;margin-bottom:14px}
.tb{flex:1;background:var(--s2);border-radius:12px;padding:12px 14px;display:flex;align-items:center;justify-content:space-between}
.tl{font-size:12px;color:var(--mu)}
.tv{font-family:var(--font-d);font-size:20px;font-weight:400;letter-spacing:.5px}
.tv.up{color:var(--gn)}.tv.dn{color:var(--rd)}.tv.fl{color:var(--mu)}
/* comps */
.ch2{font-size:11px;color:var(--mu);text-transform:uppercase;letter-spacing:.07em;margin-bottom:8px;display:flex;justify-content:space-between;font-weight:600}
.cr2{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--bd)}
.cr2:last-child{border-bottom:none}
a.cr2{cursor:pointer;transition:background .15s;border-radius:8px;padding:10px 8px;margin:0 -8px}
a.cr2:active{background:var(--s2)}
.cl2{flex:1;min-width:0;display:flex;align-items:center;gap:10px}
.ctw{min-width:0;overflow:hidden;flex:1}
.ct2{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:block;color:inherit;text-decoration:none}
a.ct2{color:var(--a2);cursor:pointer}
a.ct2:hover,a.ct2:active{text-decoration:underline}
.cd2{font-size:11px;color:var(--mu);margin-top:2px;display:flex;align-items:center;gap:4px}
.cp2{font-family:var(--font-d);font-size:18px;color:var(--ac);flex-shrink:0;margin-left:10px;letter-spacing:.5px}
.cth{width:48px;height:67px;border-radius:6px;object-fit:cover;background:var(--s2);border:1px solid var(--bd);flex-shrink:0}
/* add btn */
.acb{width:100%;margin-top:14px;padding:14px;background:none;border:1.5px solid var(--ac);border-radius:12px;color:var(--ac);font-size:14px;font-weight:700;cursor:pointer;font-family:var(--font-b);transition:all .15s;min-height:48px}
.acb:active{background:rgba(0,230,118,.1)}
/* banners */
.fxb{background:var(--s2);border:1px solid var(--bd);border-radius:12px;padding:10px 14px;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between;font-size:11px;color:var(--mu)}
.fxb strong{color:var(--a2)}
.tmb{background:rgba(186,117,23,.1);border:1px solid rgba(186,117,23,.25);border-radius:12px;padding:10px 14px;margin-bottom:12px;font-size:12px;color:#BA7517;line-height:1.5}
.stb{background:rgba(79,195,247,.06);border:1px solid rgba(79,195,247,.2);border-radius:12px;padding:10px 14px;margin-bottom:12px;font-size:12px;color:var(--a2);line-height:1.6}
.cqb{font-size:12px;color:var(--mu);margin-bottom:8px}
.jpb{background:rgba(255,68,68,.06);border:1px solid rgba(255,68,68,.2);border-radius:12px;padding:12px 14px;margin-bottom:14px;font-size:12px;color:var(--a3);line-height:1.6}
.spb{background:rgba(255,215,0,.06);border:1px solid rgba(255,215,0,.2);border-radius:12px;padding:12px 14px;margin-top:12px;margin-bottom:4px;font-size:12px;color:var(--gold);line-height:1.7}
.mpb{background:rgba(255,150,50,.06);border:1px solid rgba(255,150,50,.25);border-radius:12px;padding:12px 14px;margin-bottom:12px;font-size:12px;color:#ff9632;line-height:1.6}
.mpb-title{font-weight:700;margin-bottom:6px}
.mpc{display:flex;justify-content:space-between;align-items:center;padding:4px 0;border-top:1px solid rgba(255,150,50,.15)}
.mpc:first-of-type{border-top:none}
.lbg{font-size:10px;padding:2px 8px;border-radius:8px;border:1px solid var(--bd);color:var(--a2);margin-left:6px;font-weight:500}
.div{height:1px;background:var(--bd);margin:14px 0}
/* dots */
.dot{display:inline-block;width:6px;height:6px;border-radius:50%;flex-shrink:0}
.dot.live-pulse{background:var(--gn);animation:livePulse 1.5s ease-in-out infinite}
.wf.live-pulse{background:var(--gn)}
@keyframes livePulse{0%,100%{opacity:1;box-shadow:0 0 0 0 rgba(0,230,118,.6)}50%{opacity:.7;box-shadow:0 0 8px 4px rgba(0,230,118,.3)}}
.de{background:#e53238}.dt{background:#1a9cdc}.d1{background:#f7931e}.dp{background:#a855f7}.dg{background:#22c55e}.df{background:#3b82f6}
.dy{background:#ff4b4b}.dm{background:#e91e8c}.ds{background:#f472b6}.db{background:#ff8c00}
.fe{background:#e53238}.ft{background:#1a9cdc}.f1{background:#f7931e}.fp{background:#a855f7}.fg2{background:#22c55e}.ff{background:#3b82f6}
.fy{background:#ff4b4b}.fm{background:#e91e8c}.fs{background:#f472b6}.fb{background:#ff8c00}
/* camera */
.cw{background:var(--s1);border:1px solid var(--bd);border-radius:16px;overflow:hidden;margin-bottom:14px;position:relative;aspect-ratio:4/3}
video{width:100%;height:100%;object-fit:cover;display:block}
.co{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px}
.cf{width:175px;height:110px;position:relative;border:2px solid var(--ac);border-radius:10px;box-shadow:0 0 0 2000px rgba(0,0,0,.5)}
.cfl{position:absolute;left:0;right:0;height:2px;background:var(--ac);top:0;animation:sc 1.8s ease-in-out infinite}
@keyframes sc{0%,100%{top:0}50%{top:calc(100% - 2px)}}
.chi{font-size:11px;color:var(--ac);letter-spacing:.04em;font-weight:500}
.cp{position:absolute;inset:0;background:var(--s2);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px}
.cp p{font-size:13px;color:var(--mu)}
.csb{background:var(--ac);color:#000;border:none;border-radius:24px;padding:12px 24px;font-weight:700;font-size:14px;cursor:pointer;font-family:var(--font-b);min-height:48px}
.od{display:flex;align-items:center;gap:12px;margin:10px 0 14px;font-size:12px;color:var(--mu)}
.od::before,.od::after{content:'';flex:1;height:1px;background:var(--bd)}
/* history */
.hi{background:var(--s1);border:1px solid var(--bd);border-radius:14px;padding:14px 16px;margin-bottom:8px;display:flex;align-items:center;cursor:pointer;animation:fu .2s ease;transition:border-color .15s;min-height:64px}
.hi:active{border-color:var(--ac)}
.hn{font-size:14px;font-weight:600}
.hm{font-size:12px;color:var(--mu);margin-top:3px}
.hp{font-family:var(--font-d);font-size:22px;color:var(--ac);font-weight:400;letter-spacing:.5px}
.ht{font-size:11px;color:var(--mu);margin-top:2px}
.clb{width:100%;background:none;border:1px solid var(--bd);border-radius:12px;padding:12px;color:var(--mu);font-size:13px;cursor:pointer;margin-top:8px;font-family:var(--font-b);font-weight:500;min-height:44px}
.emp{text-align:center;padding:48px 0}
.emp p{font-size:13px;color:var(--mu);margin-top:10px;line-height:1.7}
/* collection */
.colhd{background:var(--s2);border:1px solid var(--bd);border-radius:16px;padding:20px;margin-bottom:16px}
.cvl{font-size:11px;color:var(--mu);text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px;font-weight:600}
.ctot{font-family:var(--font-d);font-size:48px;font-weight:400;letter-spacing:1px;color:var(--ac);margin-bottom:8px}
.cst{display:flex;gap:16px}
.css{font-size:12px;color:var(--mu)}
.css span{color:var(--tx);font-weight:700}
.cac{display:flex;gap:8px;margin-bottom:16px}
.cbtn{flex:1;padding:12px 8px;border-radius:12px;border:1px solid var(--bd);background:var(--s1);color:var(--tx);font-size:12px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;font-family:var(--font-b);min-height:48px;transition:all .15s}
.cbtn svg{width:14px;height:14px;flex-shrink:0}
.cbtn.pr{background:var(--ac);border-color:var(--ac);color:#000}
.ci{background:var(--s1);border:1px solid var(--bd);border-radius:14px;padding:12px 14px;margin-bottom:8px;display:flex;align-items:center;gap:10px;animation:fu .2s ease}
.cith{width:36px;height:50px;border-radius:5px;object-fit:cover;background:var(--s2);border:1px solid var(--bd);flex-shrink:0}
.cii{flex:1;min-width:0}
.cin{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cim{font-size:11px;color:var(--mu);margin-top:2px}
.cip{text-align:right;flex-shrink:0}
.civ{font-family:var(--font-d);font-size:20px;color:var(--ac);font-weight:400;letter-spacing:.5px}
.cipa{font-size:11px;color:var(--mu);margin-top:2px}
.cig{font-size:11px;margin-top:2px;font-weight:600}
.cig.up{color:var(--gn)}.cig.dn{color:var(--rd)}
.cdel{background:none;border:none;color:var(--mu);cursor:pointer;padding:6px;font-size:18px;flex-shrink:0}
/* TCG GROUP CARDS */
.tcg-group{background:var(--s1);border:1px solid var(--bd);border-radius:16px;overflow:hidden;margin-bottom:14px;animation:fu .25s ease}
.tcg-group-header{padding:16px 18px 12px;display:flex;align-items:center;justify-content:space-between;cursor:pointer}
.tcg-group-left{display:flex;align-items:center;gap:12px}
.tcg-icon{width:42px;height:42px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.tcg-group-name{font-size:16px;font-weight:700}
.tcg-group-sub{font-size:12px;color:var(--mu);margin-top:2px}
.tcg-group-right{text-align:right}
.tcg-group-val{font-family:var(--font-d);font-size:24px;font-weight:400;color:var(--ac);letter-spacing:.5px}
.tcg-group-gain{font-size:12px;margin-top:2px;font-weight:600}
.tcg-group-gain.up{color:var(--gn)}.tcg-group-gain.dn{color:var(--rd)}
.tcg-divider{height:1px;background:var(--bd);margin:0 18px}
.tcg-top3{padding:14px 18px 16px}
.tcg-top3-label{font-size:11px;color:var(--mu);text-transform:uppercase;letter-spacing:.07em;margin-bottom:10px;font-weight:600}
.tcg-top3-cards{display:flex;gap:10px}
.tcg-card-slot{flex:1;background:var(--s2);border-radius:12px;padding:10px 8px;display:flex;flex-direction:column;align-items:center;gap:6px;min-width:0}
.tcg-card-img{width:100%;aspect-ratio:2.5/3.5;object-fit:cover;border-radius:8px;background:var(--bd);display:block}
.tcg-card-name{font-size:11px;font-weight:600;text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;width:100%}
.tcg-card-price{font-family:var(--font-d);font-size:16px;color:var(--ac);font-weight:400;letter-spacing:.5px}
.tcg-card-grade{font-size:10px;color:var(--mu)}
.tcg-see-all{display:block;width:100%;padding:12px;background:none;border:none;border-top:1px solid var(--bd);font-size:13px;color:var(--mu);cursor:pointer;text-align:center;font-family:var(--font-b);font-weight:500;min-height:44px}
.tcg-see-all:hover{color:var(--tx)}
/* expanded card list */
.tcg-expanded{display:none;padding:0 18px 14px}
.tcg-expanded.open{display:block}
/* scan overlay for collection */
.csw{background:var(--s1);border:2px solid var(--ac);border-radius:16px;overflow:hidden;margin-bottom:14px;position:relative}
.cso{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;pointer-events:none}
.csf{width:210px;height:130px;position:relative;border:2px solid var(--ac);border-radius:10px;box-shadow:0 0 0 2000px rgba(0,0,0,.5)}
.csfl{position:absolute;left:0;right:0;height:2px;background:var(--ac);top:0;animation:sc 1.6s ease-in-out infinite}
.csst{font-size:11px;color:var(--ac);letter-spacing:.04em;font-weight:500}
.csct{font-size:12px;font-weight:700;color:var(--tx);background:rgba(0,0,0,.7);padding:4px 12px;border-radius:24px}
.cssp{pointer-events:all;background:rgba(0,0,0,.7);border:1px solid var(--a3);color:var(--a3);font-size:12px;padding:8px 18px;border-radius:24px;cursor:pointer;font-family:var(--font-b);min-height:44px}
/* modal */
.mo{position:fixed;inset:0;background:rgba(0,0,0,.8);display:flex;align-items:center;justify-content:center;z-index:100;padding:20px;backdrop-filter:blur(4px)}
.mob{background:var(--s1);border:1px solid var(--bd);border-radius:20px;padding:24px;width:100%;max-width:320px}
.mot{font-size:17px;font-weight:700;margin-bottom:6px}
.mos{font-size:12px;color:var(--mu);margin-bottom:16px}
.moi{width:100%;background:var(--s2);border:1.5px solid var(--bd);border-radius:12px;padding:12px 16px;font-size:16px;color:var(--tx);outline:none;margin-bottom:14px;font-family:var(--font-b);min-height:48px}
.moi:focus{border-color:var(--ac)}
.mobs{display:flex;gap:8px}
.mobs button{flex:1;padding:12px;border-radius:12px;border:1px solid var(--bd);background:var(--s2);color:var(--tx);font-size:14px;font-weight:600;cursor:pointer;font-family:var(--font-b);min-height:48px;transition:all .15s}
.mobs button.ok{background:var(--ac);border-color:var(--ac);color:#000}
/* back button */
.back-btn{display:flex;align-items:center;gap:6px;font-size:13px;font-family:var(--font-b);color:var(--mu);background:none;border:none;cursor:pointer;padding:12px 16px;min-height:44px;width:100%;text-align:left;transition:color .15s}
.back-btn:active{color:var(--tx)}
</style>
</head>
<body>
<div id="app">
<header>
  <div>
    <div class="logo">Card<b>Pulse</b></div>
    <div class="logo-sub">Real-time market pricing</div>
  </div>
  <div class="htag">LIVE</div>
</header>
<div class="tabs">
  <button class="tab on" onclick="go('search')">Search</button>
  <button class="tab" onclick="go('scan')">Scan</button>
  <button class="tab" onclick="go('collection')">Collection</button>
  <button class="tab" onclick="go('history')">History</button>
</div>

<!-- SEARCH -->
<div id="p-search" class="pane on">
  <div class="sw">
    <input class="si" id="si" placeholder="Card name · set name · set code (e.g. Son Goku BT27-019)" autocomplete="off"
      oninput="toggleClear();acOnInput(this.value)"
      onkeydown="acKeydown(event)"/>
    <button class="scl" id="scl" onclick="clearSearch()" aria-label="Clear search">×</button>
    <button class="sb" onclick="doSearch()"><svg viewBox="0 0 24 24" fill="none" stroke="#000" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg></button>
    <div class="ac-drop" id="ac-drop"></div>
  </div>
  <div class="fr"><span class="fl">Grade</span><div class="fg" id="gc">
    <button class="ch on" onclick="pick(this,'g')">Raw</button>
    <button class="ch" onclick="pick(this,'g')">PSA 10</button>
    <button class="ch" onclick="pick(this,'g')">PSA 9</button>
    <button class="ch" onclick="pick(this,'g')">BGS 10</button>
    <button class="ch" onclick="pick(this,'g')">CGC 10</button>
  </div></div>
  <button class="filter-toggle" onclick="this.nextElementSibling.classList.toggle('filters-open');this.querySelector('.ft-arrow').textContent=this.nextElementSibling.classList.contains('filters-open')?'▴':'▾'">Filters <span class="ft-arrow">▾</span></button>
  <div class="filter-collapse">
  <div class="fr"><span class="fl">Cond</span><div class="fg" id="cc">
    <button class="ch on" onclick="pick(this,'c')">Any</button>
    <button class="ch" onclick="pick(this,'c')">NM</button>
    <button class="ch" onclick="pick(this,'c')">EX</button>
    <button class="ch" onclick="pick(this,'c')">VG</button>
  </div></div>
  <div class="fr"><span class="fl">Lang</span><div class="fg" id="lc">
    <button class="ch lon" onclick="pickL(this)">English</button>
    <button class="ch" onclick="pickL(this)">Japanese</button>
    <button class="ch" onclick="pickL(this)">Korean</button>
    <button class="ch" onclick="pickL(this)">Chinese</button>
    <button class="ch" onclick="pickL(this)">Other</button>
  </div></div>
  </div>
  <div id="sr"></div>
</div>

<!-- SCAN -->
<div id="p-scan" class="pane">
  <div class="cw">
    <video id="sv" autoplay playsinline muted></video>
    <div class="co" id="so" style="display:none">
      <div class="cf"><div class="cfl"></div></div>
      <div class="chi">ALIGN BARCODE OR CARD TEXT</div>
    </div>
    <div class="cp" id="sp">
      <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="var(--mu)" stroke-width="1.5"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
      <p>Camera off</p>
      <button class="csb" onclick="camOn()">Enable Camera</button>
    </div>
  </div>
  <div class="od">or type manually</div>
  <div class="sw">
    <input class="si" id="ssi" placeholder="Enter card details..." autocomplete="off" onkeydown="if(event.key==='Enter')doScanSearch()"/>
    <button class="sb" onclick="doScanSearch()"><svg viewBox="0 0 24 24" fill="none" stroke="#000" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg></button>
  </div>
  <div id="ssr"></div>
</div>

<!-- COLLECTION -->
<div id="p-collection" class="pane">
  <div class="colhd">
    <div class="cvl">Portfolio value</div>
    <div class="ctot" id="ctot">$0.00</div>
    <div class="cst">
      <div class="css"><span id="ccount">0</span> cards</div>
      <div class="css">Paid <span id="cpaid">$0.00</span></div>
      <div class="css" id="cgain"></div>
    </div>
  </div>
  <div class="cac">
    <button class="cbtn pr" onclick="startCollScan()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
      Scan cards
    </button>
    <button class="cbtn" onclick="go('search');showHint()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      Manual add
    </button>
    <button class="cbtn" onclick="exportCSV()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      CSV
    </button>
  </div>
  <div id="coll-scan-section" style="display:none">
    <div class="csw">
      <video id="cv" autoplay playsinline muted style="width:100%;aspect-ratio:4/3;object-fit:cover;display:block"></video>
      <div class="cso">
        <div class="csf"><div class="csfl"></div></div>
        <div class="csst" id="csst">HOLD CARD IN FRAME</div>
        <div class="csct" id="csct">0 cards scanned</div>
        <button class="cssp" onclick="stopCollScan()">Done scanning</button>
      </div>
    </div>
    <div class="od">or add manually</div>
    <div class="sw">
      <input class="si" id="cmi" placeholder="Card name · grade" autocomplete="off" onkeydown="if(event.key==='Enter')addManual()"/>
      <button class="sb" onclick="addManual()"><svg viewBox="0 0 24 24" fill="none" stroke="#000" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg></button>
    </div>
  </div>
  <div id="cl"></div>
</div>

<!-- HISTORY -->
<div id="p-history" class="pane">
  <div id="hl"></div>
</div>

<!-- MODAL -->
<div class="mo" id="modal" style="display:none">
  <div class="mob">
    <div class="mot" id="mtitle">Add to collection</div>
    <div class="mos">What did you pay? (optional)</div>
    <input type="number" class="moi" id="mpaid" placeholder="e.g. 45.00" step="0.01" min="0"/>
    <div class="mobs">
      <button onclick="closeModal(false)">Skip</button>
      <button class="ok" onclick="closeModal(true)">Add card</button>
    </div>
  </div>
</div>
</div>

<script>
// STATE
let G='Raw',C='Any',L='English',stream=null,collStream=null,collN=0,pending=null,hintShown=false;
let hist=JSON.parse(localStorage.getItem('cph')||'[]');
let coll=JSON.parse(localStorage.getItem('cpc')||'[]');

// BACK NAVIGATION STACK
let navStack=[];
let _lastDisambigHTML='';
let _lastDisambigQuery='';
let _skipNavPush=false;

function navPush(view,query,card){
  navStack.push({view,query,card:card||null});
  history.pushState({navDepth:navStack.length},'',window.location.pathname);
}

function renderBackBtn(){
  if(navStack.length<=1)return'';
  return'<button class="back-btn" onclick="goBack()">\u2190 Back</button>';
}

function goBack(){
  if(navStack.length<=1){navStack=[];document.getElementById('sr').innerHTML='';document.getElementById('si').focus();return;}
  navStack.pop();
  const prev=navStack[navStack.length-1];
  const el=document.getElementById('sr');
  if(!prev||prev.view==='search'){
    navStack=[];
    el.innerHTML='';
    document.getElementById('si').value=prev?prev.query:'';
    toggleClear();
    selectedCard=null;
    document.getElementById('si').focus();
  }else if(prev.view==='disambiguation'){
    selectedCard=null;
    document.getElementById('si').value=prev.query;
    toggleClear();
    el.innerHTML=renderBackBtn()+_lastDisambigHTML;
  }
}

window.addEventListener('popstate',function(e){
  if(navStack.length>1){goBack();}
});

// NAV
function go(t){
  ['search','scan','collection','history'].forEach((n,i)=>{
    document.getElementById('p-'+n).classList.toggle('on',n===t);
    document.querySelectorAll('.tab')[i].classList.toggle('on',n===t);
  });
  if(t==='history')renderHist();
  if(t==='collection')renderColl();
  if(t!=='scan'&&stream)camOff();
  if(t!=='collection'&&collStream)stopCollScan();
}

// FILTERS
const _GRADE_RE = /\b(?:psa\s*10|psa\s*9|bgs\s*10|bgs\s*9\.?5|cgc\s*10)\b/gi;
const _GRADE_MAP = {'PSA 10':'psa 10','PSA 9':'psa 9','BGS 10':'bgs 10','BGS 9.5':'bgs 9.5','CGC 10':'cgc 10'};
let _manualGrade = false;
function pick(el,g){
  document.getElementById(g==='g'?'gc':'cc').querySelectorAll('.ch').forEach(c=>c.classList.remove('on'));
  el.classList.add('on');
  if(g==='g'){
    G=el.textContent.trim();_manualGrade=true;
    // Update query: replace/add/remove grade term to match new grade
    const si=document.getElementById('si');
    let q=si.value.trim();
    const hasGrade=_GRADE_RE.test(q); _GRADE_RE.lastIndex=0;
    const stripped=q.replace(_GRADE_RE,'').replace(/\s{2,}/g,' ').trim();
    if(G==='Raw'){q=stripped;}
    else if(hasGrade){q=stripped+' '+_GRADE_MAP[G];}
    else{q=stripped+' '+(_GRADE_MAP[G]||'');}
    q=q.trim(); si.value=q;
    console.log('[pick] grade set to',JSON.stringify(G),'query →',q);
  }else{C=el.textContent.trim();}
  const q=document.getElementById('si').value.trim();
  if(q)search(q,'sr');
}
function pickL(el){
  document.getElementById('lc').querySelectorAll('.ch').forEach(c=>c.classList.remove('lon'));
  el.classList.add('lon'); L=el.textContent;
  const q=document.getElementById('si').value.trim();
  if(q)search(q,'sr');
}

// CAMERA (scan tab)
async function camOn(){
  try{stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'}});
    document.getElementById('sv').srcObject=stream;
    document.getElementById('sp').style.display='none';
    document.getElementById('so').style.display='flex';
  }catch(e){alert('Camera unavailable. Use text search.');}
}
function camOff(){
  if(stream){stream.getTracks().forEach(t=>t.stop());stream=null;}
  document.getElementById('sp').style.display='flex';
  document.getElementById('so').style.display='none';
}

// SEARCH
function toggleClear(){document.getElementById('scl').classList.toggle('vis',document.getElementById('si').value.length>0);}
function clearSearch(){const i=document.getElementById('si');i.value='';document.getElementById('sr').innerHTML='';document.getElementById('scl').classList.remove('vis');selectedCard=null;navStack=[];hideAc();i.focus();}
function doSearch(){const q=document.getElementById('si').value.trim();if(q){clearTimeout(acTimer);if(acAbort){acAbort.abort();acAbort=null;}hideAc();selectedCard=null;search(q,'sr');}}
function doScanSearch(){const q=document.getElementById('ssi').value.trim();if(q)search(q,'ssr');}

// AUTOCOMPLETE — Card Catalog
let acTimer=null,acSel=-1,acList=[],selectedCard=null,acAbort=null;
// Client-side cache: last 20 query results, keyed by query string
const acCache=new Map();
const AC_CACHE_MAX=20;
function acCacheSet(k,v){if(acCache.size>=AC_CACHE_MAX){const oldest=acCache.keys().next().value;acCache.delete(oldest);}acCache.set(k,v);}
const GAME_ICONS={
  direct:'<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>',
};
function showAcLoading(){
  const drop=document.getElementById('ac-drop');
  drop.innerHTML='<div class="ac-load"><span class="ac-dot"></span><span class="ac-dot"></span><span class="ac-dot"></span></div>';
  drop.classList.add('open');
}
function acOnInput(v){
  clearTimeout(acTimer);
  if(acAbort){acAbort.abort();acAbort=null;} // cancel in-flight request
  selectedCard=null; // clear on new typing
  const q=v.trim();
  if(q.length<3){hideAc();return;}
  // Check client cache first — instant render, no network
  const cached=acCache.get(q);
  if(cached){renderAc(cached,q);return;}
  acTimer=setTimeout(()=>fetchAc(q),350);
}
function acKeydown(e){
  const open=document.getElementById('ac-drop').classList.contains('open');
  if(e.key==='ArrowDown'){if(open){e.preventDefault();acMove(1);}return;}
  if(e.key==='ArrowUp'){if(open){e.preventDefault();acMove(-1);}return;}
  if(e.key==='Escape'){hideAc();return;}
  if(e.key==='Enter'){clearTimeout(acTimer);if(acAbort){acAbort.abort();acAbort=null;}if(open&&acSel>=0){e.preventDefault();selectAc(acSel);}else{hideAc();doSearch();document.getElementById('si').blur();}}
}
async function fetchAc(q){
  if(acAbort){acAbort.abort();}
  const ctrl=new AbortController();
  acAbort=ctrl;
  showAcLoading();
  try{
    const r=await fetch(`/api/cards?q=${encodeURIComponent(q)}`,{signal:ctrl.signal});
    if(ctrl.signal.aborted)return; // superseded by newer request
    if(!r.ok){hideAc();return;}
    const d=await r.json();
    acCacheSet(q,d); // store in client cache
    renderAc(d,q);
  }catch(err){if(err.name==='AbortError')return;console.error('[ac] fetch error:', err);hideAc();}
  finally{if(acAbort===ctrl)acAbort=null;}
}
const RARITY_DISPLAY={'DBR':'SCR*','SGR':'SCR*'};
function rarityPill(r){
  const u=(r||'').toUpperCase();
  const display=RARITY_DISPLAY[u]||r;
  let bg='#333',fg='#999';
  if(/^SCR\*|^SR\*|^DBR|^SGR|^DR$|^DAR/.test(u)){bg='#FF8C00';fg='#000';}
  else if(/^SCR|^SR$|^SPR|^SEC|^SSR|^SAR|^FR$|^GFR/.test(u)){bg='#ffd700';fg='#000';}
  else if(u==='UC'){bg='#1565c0';fg='#fff';}
  else if(u==='R'){bg='#2e7d32';fg='#fff';}
  else if(u==='L'||u==='SP'||u==='IVR'){bg='#6a1b9a';fg='#fff';}
  else if(u==='C'){bg='#333';fg='#999';}
  else if(u==='ST'){bg='#555';fg='#ccc';}
  else if(/^PR/.test(u)){bg='#00695c';fg='#fff';}
  return`<span style="background:${bg};color:${fg};font-size:11px;font-weight:700;padding:2px 6px;border-radius:4px;white-space:nowrap">${escH(display)}</span>`;
}
function renderAc(d,q){
  const drop=document.getElementById('ac-drop');
  // Filter: first query word must appear in card name (prevents "james" matching "Jessie & James")
  const _firstWord=(q||'').toLowerCase().split(/\s+/).find(w=>w.length>=3&&!/^(psa|bgs|cgc|raw|rookie|rc|card|the|and|for)$/i.test(w))||'';
  const catalogCards=(d.cards||[]).filter(c=>{
    if(!_firstWord||c.isDirect)return true;
    return(c.name||'').toLowerCase().includes(_firstWord);
  });
  // If no catalog results, only show the eBay direct option
  acList=catalogCards.length>0?[...catalogCards,d.ebayDirect].filter(Boolean):[d.ebayDirect].filter(Boolean);
  acSel=-1;
  if(!acList.length){hideAc();return;}
  // Read current input value for the eBay direct text (not the debounced query)
  const currentInput=document.getElementById('si').value.trim();
  drop.innerHTML=acList.map((c,i)=>{
    if(c.isDirect){
      const directText=`Search eBay directly for '${currentInput||q}'`;
      // Update searchQuery to match current input
      c.searchQuery=currentInput||q;
      return`<div class="ac-item" data-i="${i}" onmousedown="selectAc(${i})"><div class="ac-img" style="display:flex;align-items:center;justify-content:center">${GAME_ICONS.direct}</div><div style="min-width:0;flex:1"><div class="ac-name" style="color:var(--mu);font-size:12px">${escH(directText)}</div></div><span class="ac-badge dir">${GAME_ICONS.direct}</span></div>`;
    }
    const img=c.imageUrl?`<img class="ac-img" src="${escH(c.imageUrl)}" loading="lazy" onerror="this.style.background='#1a1a2e';this.style.display='none';this.parentElement.querySelector('.ac-ph')&&(this.parentElement.querySelector('.ac-ph').style.display='flex')"${c.isSet?' style="object-fit:contain;padding:8px"':''}>`:`<div class="ac-img" style="background:#1a1a2e;display:flex;align-items:center;justify-content:center;color:#666;font-size:10px;font-family:monospace;text-align:center;line-height:1.2">${escH(c.set||c.game||'')}</div>`;
    const showSet=!c.isSet&&c.set&&c.number&&!c.number.toUpperCase().startsWith(c.set.toUpperCase())?c.set:null;
    const subParts=[showSet,c.number].filter(Boolean).join(' \u00b7 ');
    const rPill=c.rarity?rarityPill(c.rarity):'';
    const nameStyle=c.isSet?' style="color:var(--a2)"':'';
    const ebayBadge=c.viaEbay?'<span style="font-family:monospace;font-size:8px;color:var(--mu);border:1px solid var(--bd);border-radius:3px;padding:0 4px;margin-left:4px;flex-shrink:0">via eBay</span>':'';
    const subHTML=subParts||rPill?`<div class="ac-sub">${escH(subParts)}${rPill?' '+rPill:''}</div>`:'';
    return`<div class="ac-item" data-i="${i}" onmousedown="selectAc(${i})">${img}<div style="min-width:0;flex:1"><div class="ac-name"${nameStyle}>${escH(c.name)}</div>${subHTML}</div>${ebayBadge}</div>`;
  }).join('');
  // Japanese exclusive set banner — suggest but don't force language change
  if(d.jpExclusive && catalogCards.length>0){
    const langNote=L==='Japanese'?'':'  — tap Japanese in the language filter for best results';
    drop.innerHTML=`<div class="ac-attr" style="color:var(--a2);padding:6px 12px;border-bottom:1px solid var(--bd);font-size:9px">🇯🇵 Japanese exclusive set detected${escH(langNote)}</div>`+drop.innerHTML;
  }
  // Attribution line
  if(d.attribution){
    const attrText=d.game==='pokemon'?'Powered by pokemontcg.io':d.game==='mtg'?'Powered by Scryfall':`Powered by ${d.attribution}`;
    drop.innerHTML+=`<div class="ac-attr">${escH(attrText)}</div>`;
  }
  drop.classList.add('open');
}
function hideAc(){document.getElementById('ac-drop').classList.remove('open');acSel=-1;}
function acMove(dir){
  const items=document.querySelectorAll('#ac-drop .ac-item');
  if(!items.length)return;
  if(acSel>=0)items[acSel].classList.remove('sel');
  acSel=Math.max(0,Math.min(items.length-1,acSel+dir));
  items[acSel].classList.add('sel');
  items[acSel].scrollIntoView({block:'nearest'});
}
function selectAc(i){
  const card=acList[i];if(!card)return;
  if(card.isDirect){
    // Direct eBay search — no selectedCard, use free text
    selectedCard=null;
    document.getElementById('si').value=card.searchQuery;
    toggleClear();hideAc();
    search(card.searchQuery,'sr');
    return;
  }
  // Store full card metadata for the search flow
  // Build eBay-optimized searchQuery:
  // 1. Use card number + short name (truncated at first comma) for best eBay results
  // 2. Strip colons and special chars
  // 3. Convert "-p1"/"-p2"/"-p3" suffixes to "parallel"
  let cleanSQ;
  const hasCardNum=card.number&&/^[A-Z]{1,4}\d+-/i.test(card.number);
  console.log('[selectAc] card.number:', JSON.stringify(card.number), 'hasCardNum:', hasCardNum, 'card.name:', JSON.stringify(card.name));
  if(hasCardNum){
    // Card number available — build short query: "Name CardNum [variant keyword]"
    const shortName=(card.name||'').split(',')[0].split(' // ')[0].trim();
    const rUp=(card.rarity||'').toUpperCase();
    // Append variant keywords for starred/premium rarities so eBay finds the right version
    const variantSuffix=/\*/.test(rUp)?' alt art':rUp==='DBR'?' dragon ball rare':rUp==='SGR'?' gold rare':'';
    cleanSQ=(shortName+' '+card.number+variantSuffix).replace(/[:;+]/g,' ').replace(/\s+/g,' ').trim();
    console.log('[selectAc] built short query:', JSON.stringify(cleanSQ), 'rarity:', JSON.stringify(card.rarity));
  }else if(card.game==='mtg'&&card.set){
    // MTG: use card name + set name (sellers don't use collector numbers)
    const shortName=(card.name||'').split(' // ')[0].trim();
    cleanSQ=(shortName+' '+card.set).replace(/[:;+]/g,' ').replace(/\s+/g,' ').trim();
    console.log('[selectAc] MTG query:', JSON.stringify(cleanSQ));
  }else{
    cleanSQ=(card.searchQuery||card.name||'').replace(/[:;+]/g,' ').replace(/\s+/g,' ').trim();
    console.log('[selectAc] using full searchQuery:', JSON.stringify(cleanSQ));
  }
  cleanSQ=cleanSQ.replace(/\b(\w+-\d+)-p\d+\b/gi,'$1 parallel');
  selectedCard={
    name:card.name,
    set:card.set,
    number:card.number,
    rarity:card.rarity,
    game:card.game,
    imageUrl:card.largeImageUrl||card.imageUrl||null,
    searchQuery:cleanSQ,
  };
  console.log('[selectAc] final selectedCard.searchQuery:', JSON.stringify(selectedCard.searchQuery));
  // Show clean display name in input
  const displayName=[card.name,card.number].filter(Boolean).join(' ');
  document.getElementById('si').value=displayName;
  toggleClear();hideAc();
  // Run search using the optimized eBay query
  search(selectedCard.searchQuery,'sr');
}

// Toggle between real API and mock data.
// Set USE_REAL_API = true once your Vercel backend is deployed.
const USE_REAL_API = true;

async function search(q, elId) {
  hideAc();
  const el = document.getElementById(elId);
  // Push search state to nav stack (only for main search pane, skip if coming from disambigPick)
  if(elId==='sr'&&!_skipNavPush){navPush('search',document.getElementById('si').value.trim(),null);}
  _skipNavPush=false;
  el.innerHTML = '<div class="ld"><div class="sp"></div><p>Checking eBay sold listings…</p></div>';
  // Auto-detect grade from query keywords (skip if user just clicked a grade button)
  if (!_manualGrade) {
    const GRADE_DETECT = [
      [/\bpsa\s*10\b/i, 'PSA 10'], [/\bpsa\s*9\b/i, 'PSA 9'],
      [/\bbgs\s*10\b/i, 'BGS 10'], [/\bbgs\s*9\.?5\b/i, 'BGS 9.5'],
      [/\bcgc\s*10\b/i, 'CGC 10'],
    ];
    let detected = false;
    for (const [re, grd] of GRADE_DETECT) {
      if (re.test(q)) {
        G = grd; detected = true;
        document.getElementById('gc').querySelectorAll('.ch').forEach(c => {
          c.classList.toggle('on', c.textContent.trim() === grd);
        });
        console.log('[grade-detect] auto-set grade to', grd);
        break;
      }
    }
    // No grade term in query → reset to Raw
    if (!detected && G !== 'Raw') {
      G = 'Raw';
      document.getElementById('gc').querySelectorAll('.ch').forEach(c => {
        c.classList.toggle('on', c.textContent.trim() === 'Raw');
      });
      console.log('[grade-detect] no grade term, reset to Raw');
    }
  }
  _manualGrade = false;
  // Capture selectedCard at search time (it gets cleared on next input)
  const sc = selectedCard;
  if (USE_REAL_API) {
    try {
      // When a catalog card was selected, bypass preprocessor with exact query
      const searchQ = sc ? sc.searchQuery : q;
      console.log('[search] grade=', JSON.stringify(G), 'lang=', JSON.stringify(L), 'q=', searchQ, sc ? '(catalog)' : '(free text)');
      const params = new URLSearchParams({ q: searchQ, grade: G, lang: L });
      if (sc) params.set('exact', '1'); // tell backend to skip preprocessor
      if (sc?.imageUrl) params.set('cardImageUrl', sc.imageUrl); // pass official image for card_catalog
      const res = await fetch(`/api/prices?${params}`);
      const data = await res.json();
      // Disambiguation: multiple distinct cards found — show picker
      if (data.type === 'disambiguation') {
        if(elId==='sr'){navPush('disambiguation',document.getElementById('si').value.trim(),null);}
        renderDisambiguation(el, data);
        return;
      }
      if (data.type === 'no-data' || (data.error && res.status === 404)) {
        const cardImg=sc?.imageUrl?`<img src="${escH(sc.imageUrl)}" style="width:120px;border-radius:8px;margin-bottom:12px" onerror="this.style.display='none'">`:'';
        const cardName=sc?.name||q;
        const tip=data.searchTip?`<p style="margin-top:10px;font-size:12px;color:var(--a2);line-height:1.6">${escH(data.searchTip)}</p>`:'';
        el.innerHTML = `<div class="emp" style="padding:32px 0">${cardImg}<p style="margin-top:10px">No sold comps found for<br><strong style="color:var(--tx)">${escH(cardName)}</strong></p><p style="margin-top:8px;font-size:12px;color:var(--mu);line-height:1.6">This card may be too new or have limited market activity.<br>Try searching without the parallel variant.</p>${tip}</div>`;
        return;
      }
      if (data.error) {
        throw new Error(data.error);
      }
      if (!res.ok) throw new Error(`API error ${res.status}`);
      const r = normalizeApiResponse(data, q, sc);
      renderResult(el, sc ? sc.name : q, r);
      saveHist(sc ? sc.name : q, r);
    } catch(err) {
      el.innerHTML = `<div class="ld"><p style="color:var(--rd);text-align:center;font-family:monospace;font-size:11px">Could not load prices.<br>${escH(err.message)}</p></div>`;
    }
  } else {
    // Mock mode — remove this block once USE_REAL_API = true
    setTimeout(() => {
      const r = price(q, G, C, L);
      renderResult(el, q, r);
      saveHist(q, r);
    }, 1100 + Math.random() * 700);
  }
}

/**
 * Normalise the real API response into the same shape
 * that renderResult() and the rest of the UI expect.
 * This means the frontend never needs to change when
 * the backend changes — only this adapter function does.
 */
function normalizeApiResponse(data, q, sc) {
  function cardType(q, g) {
  const ql = q.toLowerCase();
  if (['dragon ball','dragonball','dbs','dbscg','fusion world',
       'd-bt','bt1','bt2','bt3','bt4','bt5','bt6','bt7','bt8',
       'bt9','bt10','bt11','bt12','bt13','bt14','bt15','bt16',
       'bt17','bt18','bt19','bt20','fb0','fb1','fb2','fb3',
       'sd0','sd1','sd2',
       'gogeta','goku','vegeta','frieza',
       'kamehameha','final flash','galick gun','spirit bomb','instant transmission',
       'hakai','ultra instinct','god kamehameha','destructo disc',
       'special beam cannon','makankosappo'].some(k => ql.includes(k))) return 'dbs';
  if (['pokemon','charizard','pikachu','mtg','magic ','yugioh','yu-gi-oh',
       'blue-eyes','blue eyes','dark magician','exodia','red-eyes','kuriboh',
       'lorcana','disney lorcana','one piece','onepiece','optcg',
       'luffy','zoro','nami','sanji','usopp','chopper','robin','franky','brook','jinbe',
       'shanks','ace','whitebeard','blackbeard','hancock','mihawk',
       'crocodile','doflamingo','katakuri','kaido','big mom','yamato','uta',
       'op-01','op-02','op-03','op-04','op-05','op-06','op-07',
       'op-08','op-09','op-10','op-11','op-12','op-13','op-14',
       'op01','op02','op03','op04','op05','op06','op07','op08','op09',
       'op10','op11','op12','op13','op14',
       'st01','st02','st03','st04','st05','st06','st07','st08','st09',
       'st10','st11','st12','st13','st14','st15','st16','st17','st18',
       'eb01','eb02',
       'ash','misty','brock','team rocket','jessie','james','giovanni',
       'gary','professor oak','nurse joy','gym leader','elite four','trainer'].some(k => ql.includes(k))) return 'tcg';
  return g !== 'Raw' ? 'sg' : 'sr';
}
  const ct = cardType(q, G);
  const jx = ct === 'dbs' && jpEx(q);

  // Map the three eBay query strategies into the source breakdown format
  const sd = (data.sourceBreakdown || []).map((s, i) => {
    const isLive = s.live === true;
    return {
      n:  s.label,
      ok: s.available,
      ew: s.available ? Math.round(s.weight * 100) : 0,
      aU: s.avg,
      aN: s.avg,   // USD only — no native currency for eBay
      c:  'USD',
      d:  isLive ? 'live-pulse' : 'de',
      f:  isLive ? 'live-pulse' : 'fe',
    };
  });

  // Comps from real API
  const comps = (data.comps || []).map(c => ({
    title: c.title,
    pU:    c.price,
    pN:    c.price,
    c:     'USD',
    k:     'ebay',
    n:     'eBay',
    date:  c.date ? new Date(c.date).getTime() : Date.now(),
    th:    c.image || null,
    url:   c.url   || null,
    outlier: c.outlier || false,
  }));

  return {
    lo:      data.lo,
    avg:     data.avg,
    hi:      data.hi,
    t30:     data.trend30 || 0,
    t90:     data.trend90 || 0,
    conf:    data.confidence,
    ct,
    sd,
    thin:    false,
    jx,
    showFX:  false,
    l:       L,
    img:     sc?.imageUrl || data.imageUrl || getImg(q),
    comps,
    searchTip: data.searchTip || null,
    multipleProducts: data.multipleProducts || false,
    clusters: data.clusters || null,
    correctedQuery: data.correctedQuery || null,
  };
}

function srcData(baseUSD,k,c){
  const av={ebay:1,p130:.85,pwcc:.7,tcg:.9,gld:.6,fan:.75,yJP:.8,mJP:.7,sak:.75,buy:.7};
  if(Math.random()>(av[k]||.7))return null;
  const va={ebay:.12,p130:.08,pwcc:.1,tcg:.06,gld:.15,fan:.1,yJP:.14,mJP:.13,sak:.09,buy:.12};
  const bi={ebay:1,p130:1.02,pwcc:1.05,tcg:.95,gld:1.1,fan:.98,yJP:.92,mJP:.9,sak:.94,buy:.91};
  const fx=FX[c]||1,bn=baseUSD*fx,v=va[k]||.1,b=bi[k]||1;
  const na=Array.from({length:8},()=>bn*b*(1-v+Math.random()*v*2)).sort((a,b)=>a-b).slice(1,-1);
  const avg=na.reduce((a,c)=>a+c,0)/na.length;
  return{aN:avg,lN:na[0],hN:na[na.length-1],aU:toUSD(avg,c),lU:toUSD(na[0],c),hU:toUSD(na[na.length-1],c),c};
}

function price(q,g,cond,l){
  const ct=cardType(q,g),jx=ct==='dbs'&&jpEx(q),ck=cfgKey(l,ct,jx),srcs=SC[ck];
  const thin=l!=='English'&&l!=='Japanese'&&!jx;

  const sr=srcs.map(s=>({...s,data:srcData(base,s.k,s.c)}));
  const ac=sr.filter(s=>s.data);
  const tw=ac.reduce((a,s)=>a+s.w,0)||1;
  const wA=ac.reduce((a,s)=>a+s.data.aU*s.w,0)/tw;
  const wL=ac.reduce((a,s)=>a+s.data.lU*s.w,0)/tw;
  const wH=ac.reduce((a,s)=>a+s.data.hU*s.w,0)/tw;
  const sd=sr.map(s=>({...s,ok:!!s.data,ew:s.data?Math.round(s.w/tw*100):0,aU:s.data?s.data.aU:null,aN:s.data?s.data.aN:null}));
  const t30=parseFloat(((Math.random()-.45)*28).toFixed(1));
  const t90=parseFloat(((Math.random()-.42)*40).toFixed(1));
  const cds=['NM-MT','NM','EX-MT','EX','VG-EX','VG'];
  const comps=Array.from({length:10},(_,i)=>{

    return{title:q.split(' ').slice(0,4).join(' ')+' '+(g==='Raw'?cds[Math.floor(Math.random()*cds.length)]:g),
      pU:toUSD(pN,src.c),pN,c:src.c,k:src.k,n:src.n,date:Date.now()-da*86400000,
      th:'https://picsum.photos/seed/'+(Math.floor(Math.random()*9000)+1000)+'/60/84'};
  }).sort((a,b)=>b.date-a.date);
  const conf=Math.min(100,thin?30:Math.round(ac.length/srcs.length*70+30));
  return{lo:wL,avg:wA,hi:wH,t30,t90,comps,conf,ct,sd,thin,jx,showFX:ac.some(s=>s.c==='JPY'),l,img:getImg(q)};

  </div>`;
  _lastDisambigHTML=disambigContent;

  el.innerHTML=renderBackBtn()+disambigContent;
}
function disambigPick(cardNum, origQuery) {

function renderResult(el,q,r){
  hideAc(); // ensure dropdown is closed when results render

  if(el.id==='sr'){navPush('result',document.getElementById('si').value.trim(),selectedCard);}

  const fx=r.showFX?`<div class="fxb"><span>¥ → $ at <strong>¥149.5</strong> · All prices in USD</span><span style="font-size:8px;text-align:right">Rate updates<br>at search time</span></div>`:'';
  const tm=r.thin?`<div class="tmb">⚠ Thin market — limited comps for ${r.l} cards.</div>`:'';
  const jb=r.jx?`<div class="jpb"><strong>Japan-exclusive set.</strong> Auto-routed to Yahoo JP, Buyee, Mercari JP. Prices converted from ¥.</div>`:'';
  const conf=r.conf,cc=conf>=75?'var(--gn)':conf>=50?'var(--ac)':'#f7931e';
  const rad=17,circ=2*Math.PI*rad,dash=(conf/100)*circ;
  const cqb=r.correctedQuery?`<div class="cqb">Showing results for: <em>${escH(r.correctedQuery)}</em></div>`:'';
  const mpb=r.multipleProducts&&r.clusters?`<div class="mpb"><div class="mpb-title">⚠ Multiple card types found</div>${r.clusters.map(c=>`<div class="mpc"><span>${escH(c.label)} <span style="color:var(--mu)">(${c.count} sold)</span></span><span style="font-weight:700">${fP(c.avg)} avg</span></div>`).join('')}<div style="margin-top:4px;color:rgba(255,150,50,.7)">Add the set name or card number to narrow results.</div></div>`:'';
  const _isSport=r.ct==='sr'||r.ct==='sg';
  const spread=r.lo>0&&(r.hi/r.lo)>5?`<div class="spb">${_isSport
    ?`⚠ Wide price spread detected. Sports cards vary greatly by year, set, and parallel. For accurate pricing, try adding:<br>• The year: <strong>'mahomes 2017'</strong><br>• The set: <strong>'prizm'</strong>, <strong>'bowman'</strong>, <strong>'topps'</strong><br>• The card number: <strong>'#269'</strong><br>• The parallel: <strong>'base'</strong>, <strong>'silver'</strong>, <strong>'gold'</strong><br>Example: <strong>'mahomes 2017 prizm 269'</strong>`
    :`⚠ Wide price spread detected. For accurate pricing, try adding:<br>• The set code: <strong>'BT03'</strong>, <strong>'FB02'</strong>, <strong>'OP01'</strong><br>• The card number: <strong>'BT3-033'</strong>, <strong>'FB02-139'</strong><br>• The rarity: <strong>'SCR'</strong>, <strong>'SPR'</strong>, <strong>'SR*'</strong><br>• The variant: <strong>'alt art'</strong>, <strong>'holo'</strong>, <strong>'1st edition'</strong><br>Example: <strong>'vegito fb02-139 scr'</strong> or <strong>'charizard base set holo'</strong>`
  }</div>`:'';
  const _tipQuery=document.getElementById('si')?.value||q;
  const _hasCardNum=/\b[A-Z]{1,4}\d+-\d+/i.test(_tipQuery);
  const tip=r.searchTip&&!(conf>=60||r.comps.length>=5||_hasCardNum)?`<div class="stb">💡 ${escH(r.searchTip)}</div>`:'';
  const ring=`<div class="crw"><div class="cr"><svg viewBox="0 0 44 44"><circle class="dot" cx="22" cy="22" r="${rad}" style="fill:none;stroke:var(--bd);stroke-width:4"/><circle cx="22" cy="22" r="${rad}" style="fill:none;stroke:${cc};stroke-width:4;stroke-linecap:round;stroke-dasharray:${dash.toFixed(1)} ${circ.toFixed(1)};transform:rotate(-90deg);transform-origin:50% 50%"/></svg><div class="cl" style="color:${cc}">${conf}%</div></div><div><div class="crt">${conf>=75?'High confidence':conf>=50?'Moderate confidence':'Low confidence'}</div><div class="crs">${r.sd.filter(s=>s.ok).length}/${r.sd.length} sources · ${r.comps.length} comps</div></div></div>`;
  const wrows=r.sd.map(s=>{
    if(!s.ok){const noMsg=s.d==='live-pulse'?'<span style="font-family:monospace;font-size:8px;color:var(--mu);margin-left:4px">No live auctions ending soon</span>':'<span class="ndb">no data</span>';return`<div class="wr"><div class="wrt"><span class="wsn">${dot(s.d)}${s.n}${noMsg}</span><span class="wpc" style="color:var(--bd)">—</span></div><div class="wtr"><div class="wf ${s.f}" style="width:0%"></div></div></div>`;}
    const ns=s.c!=='USD'?` <span style="font-size:8px;color:var(--mu)">(${fmtN(s.aN,s.c)})</span>`:'';
    return`<div class="wr"><div class="wrt"><span class="wsn">${dot(s.d)}${s.n}</span><span class="wsp">${fP(s.aU)}${ns}<span class="wpc">${s.ew}%</span></span></div><div class="wtr"><div class="wf ${s.f}" style="width:${s.ew}%"></div></div></div>`;
  }).join('');
  const crows=r.comps.map(c=>{
    const nd=c.c!=='USD'?`<span style="font-size:8px;color:var(--mu);margin-left:3px">${fmtN(c.pN,c.c)}</span>`:'';
    const dotCls=c.k==='p130'?'d1':c.k==='yJP'?'dy':c.k==='mJP'?'dm':c.k==='sak'?'ds':c.k==='buy'?'db':c.k==='tcg'?'dt':c.k==='fan'?'df':c.k==='gld'?'dg':c.k==='pwcc'?'dp':'de';
    const titleEl=c.url?`<a class="ct2" href="${escH(c.url)}" target="_blank" rel="noopener noreferrer">${escH(c.title)}</a>`:`<div class="ct2">${escH(c.title)}</div>`;
    const outlierLabel=c.outlier?'<div style="font-size:11px;color:#ff4444;margin-top:2px">&#9888; Possible outlier</div>':'';
    const rowInner=`<div class="cl2"><img class="cth" src="${c.th}" loading="lazy" onerror="this.style.display='none'"/><div class="ctw">${titleEl}<div class="cd2">${dot(dotCls)}${c.n} · ${fD(c.date)}</div></div></div><div style="text-align:right;flex-shrink:0;margin-left:10px"><div class="cp2" style="margin-left:0">${fP(c.pU)}${nd}</div>${outlierLabel}</div>`;
    return c.url?`<a class="cr2" href="${escH(c.url)}" target="_blank" rel="noopener noreferrer" style="text-decoration:none;color:inherit">${rowInner}</a>`:`<div class="cr2">${rowInner}</div>`;
  }).join('');
  const lb=(r.l!=='English'||r.jx)?`<span class="lbg">${r.jx?'JP Exclusive':r.l}</span>`:'';
  const ctl=r.ct==='dbs'?'Dragon Ball TCG':r.ct==='tcg'?'TCG':r.ct==='sg'?'Graded Sports':'Sports Raw';
  const cardData=JSON.stringify({name:q,grade:G,cond:C,lang:L,avg:r.avg,lo:r.lo,hi:r.hi,imageUrl:r.img,ct:r.ct}).replace(/"/g,'&quot;');
  el.innerHTML=renderBackBtn()+`<div class="rc">
    <div class="rh" id="rh"><div class="shim" id="shim"></div>
    <img src="${r.img}" style="opacity:0" onload="this.style.opacity='1';var s=document.getElementById('shim');if(s)s.remove()" onerror="this.style.display='none'"/>
    <div class="rhl">${ctl}</div></div>
    <div class="rb">${jb}${fx}${tm}${cqb}
    <div class="rt">${escH(q)}${lb}</div>
    <div class="rm">${G} · ${C==='Any'?'All conditions':C}</div>
    <div class="pg">
      <div class="pb"><div class="pv av">${fP(r.avg)}</div><div class="pl">Market Price</div></div>
    </div>
    <div class="pg-range">
      <div class="pg-range-end"><div class="pl">Low</div><div class="pv">${fP(r.lo)}</div></div>
      <div class="pg-range-sep">——</div>
      <div class="pg-range-end"><div class="pl">High</div><div class="pv">${fP(r.hi)}</div></div>
    </div>
    ${mpb}
    ${spread}
    ${ring}
    ${tip}
    <div class="wh"><span>Source breakdown</span><span class="wa">Wtd avg ${fP(r.avg)}</span></div>
    ${wrows}
    <div class="div"></div>
    <div class="tr">
      <div class="tb"><span class="tl">30-day</span><span class="tv ${t3c}">${t3a} ${Math.abs(r.t30)}%</span></div>
      <div class="tb"><span class="tl">90-day</span><span class="tv ${t9c}">${t9a} ${Math.abs(r.t90)}%</span></div>
    </div>
    <div class="div"></div>
    <div class="ch2"><span>Recent sold comps</span><span>${r.comps.length} results</span></div>
    ${crows}
    <button class="acb" onclick='promptAdd("${cardData}")'>+ Add to collection</button>
    </div></div>`;
}

// HISTORY
function saveHist(q,r){
  const e={q,g:G,c:C,l:L,avg:r.avg,img:r.img,t:Date.now()};
  hist=[e,...hist.filter(h=>h.q!==q)].slice(0,50);
  localStorage.setItem('cph',JSON.stringify(hist));
}
function renderHist(){
  const el=document.getElementById('hl');
  if(!hist.length){el.innerHTML='<div class="emp"><svg width="34" height="34" viewBox="0 0 24 24" fill="none" stroke="var(--mu)" stroke-width="1.5"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg><p>No searches yet</p></div>';return;}
  el.innerHTML=hist.map(h=>{
    const m=Math.floor((Date.now()-h.t)/60000),ts=m<1?'just now':m<60?m+'m ago':Math.floor(m/60)+'h ago';
    const th=h.img?`<img src="${h.img}" style="width:30px;height:41px;object-fit:cover;border-radius:3px;border:1px solid var(--bd);flex-shrink:0;margin-right:9px" onerror="this.style.display='none'"/>`:'';
    const lb=(h.l&&h.l!=='English')?`<span class="lbg">${h.l}</span>`:'';
    return`<div class="hi" onclick="loadH('${h.q.replace(/'/g,"\\'")}','${h.g}','${h.c}','${h.l||'English'}')">${th}<div style="flex:1;min-width:0"><div class="hn">${escH(h.q)}${lb}</div><div class="hm">${h.g} · ${h.c}</div></div><div style="text-align:right;flex-shrink:0"><div class="hp">${fP(h.avg)}</div><div class="ht">${ts}</div></div></div>`;
  }).join('')+'<button class="clb" onclick="clearHist()">Clear history</button>';
}
function loadH(q,g,c,l){
  go('search');
  document.getElementById('si').value=q;
  document.getElementById('gc').querySelectorAll('.ch').forEach(x=>x.classList.toggle('on',x.textContent===g));
  document.getElementById('cc').querySelectorAll('.ch').forEach(x=>x.classList.toggle('on',x.textContent===c));
  document.getElementById('lc').querySelectorAll('.ch').forEach(x=>x.classList.toggle('lon',x.textContent===l));
  G=g;C=c;L=l||'English';
  search(q,'sr');
}
function clearHist(){hist=[];localStorage.removeItem('cph');renderHist();}

// COLLECTION
function saveColl(){localStorage.setItem('cpc',JSON.stringify(coll));}

// Map card types to display groups
const TCG_GROUPS={
  pokemon: {label:'Pokémon',   icon:'🔴', color:'#e8ff47', keys:['pokemon','charizard','pikachu','mewtwo','eevee','bulbasaur','squirtle','blastoise','venusaur','snorlax','gengar','lugia','ho-oh','rayquaza','mew']},
  dragonball:{label:'Dragon Ball',icon:'🟠',color:'#ff8c00',keys:['dragon ball','dragonball','dbs','dbscg','fusion world','d-bt','bt1','bt2','bt3','bt4','bt5','bt6','bt7','bt8','bt9','bt10','bt11','bt12','bt13','bt14','bt15','bt16','bt17','bt18','bt19','bt20','heroes','divers','goku','vegeta','frieza','gohan','piccolo']},
  gundam:    {label:'Gundam',   icon:'🔵', color:'#47c8ff', keys:['gundam','mobile suit','gundanium','zaku','gm ','rx-78','wing zero','deathscythe','heavyarms','sandrock','tallgeese']},
  mtg:       {label:'Magic: The Gathering',icon:'🟣',color:'#a855f7',keys:['mtg','magic the gathering','magic: the gathering',' mtg ','planeswalker','mana ']},
  yugioh:    {label:'Yu-Gi-Oh!',icon:'🟡',color:'#f7931e',keys:['yugioh','yu-gi-oh','yu gi oh','blue-eyes','dark magician','exodia','pot of greed','monster reborn']},
  onepiece:  {label:'One Piece',icon:'🔴',color:'#ff6b6b',keys:['one piece','luffy','zoro','nami','sanji','chopper','robin','franky','brook','op-01','op-02','op-03','op-04','op-05','op-06']},
  lorcana:   {label:'Lorcana',  icon:'⭐', color:'#4fffb0', keys:['lorcana','disney lorcana']},
  sports:    {label:'Sports Cards',icon:'🏆',color:'#6b6b85',keys:[]}, // catch-all for sports
};

function getGroup(card){
  const q=(card.name||'').toLowerCase();
  // explicit ct from card
  if(card.ct==='dbs')return'dragonball';
  for(const[gk,gv]of Object.entries(TCG_GROUPS)){
    if(gk==='sports')continue;
    if(gv.keys.some(k=>q.includes(k)))return gk;
  }
  if(card.ct==='sr'||card.ct==='sg')return'sports';
  return'other';
}

function renderColl(){
  const tot=coll.reduce((a,c)=>a+c.avg,0);
  const totP=coll.reduce((a,c)=>a+(c.paid||0),0);
  const gain=tot-totP;
  document.getElementById('ctot').textContent=fP(tot);
  document.getElementById('ccount').textContent=coll.length;
  document.getElementById('cpaid').textContent=fP(totP);
  const ge=document.getElementById('cgain');
  if(totP>0){const pct=((gain/totP)*100).toFixed(1);ge.innerHTML=`<span style="color:${gain>=0?'var(--gn)':'var(--rd)'}">${gain>=0?'+':''}${fP(gain)} (${gain>=0?'+':''}${pct}%)</span>`;}
  else ge.innerHTML='';

  const el=document.getElementById('cl');
  if(!coll.length){
    el.innerHTML=`<div class="emp"><svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="var(--mu)" stroke-width="1.5"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg><p>No cards yet.<br>Scan cards or search<br>and tap "+ Add to collection".</p></div>`;
    return;
  }

  // Group cards
  const groups={};
  coll.forEach((c,i)=>{
    const gk=getGroup(c);
    if(!groups[gk])groups[gk]={cards:[],indices:[]};
    groups[gk].cards.push(c);
    groups[gk].indices.push(i);
  });

  el.innerHTML=Object.entries(groups).map(([gk,{cards,indices}])=>{
    const gv=TCG_GROUPS[gk]||{label:gk,icon:'🃏',color:'var(--mu)'};
    const groupVal=cards.reduce((a,c)=>a+c.avg,0);
    const groupPaid=cards.reduce((a,c)=>a+(c.paid||0),0);
    const groupGain=groupVal-groupPaid;
    const gainHTML=groupPaid>0
      ?`<div class="tcg-group-gain ${groupGain>=0?'up':'dn'}">${groupGain>=0?'↑':'↓'} ${fP(Math.abs(groupGain))}</div>`
      :'';

    // Top 3 by value
    const top3=[...cards].sort((a,b)=>b.avg-a.avg).slice(0,3);
    const top3HTML=top3.map(c=>`
      <div class="tcg-card-slot">
        ${c.imageUrl?`<img class="tcg-card-img" src="${c.imageUrl}" onerror="this.style.background='var(--bd)'"/>`:`<div class="tcg-card-img"></div>`}
        <div class="tcg-card-name">${escH(c.name.split(' ').slice(0,3).join(' '))}</div>
        <div class="tcg-card-price">${fP(c.avg)}</div>
        <div class="tcg-card-grade">${c.grade}</div>
      </div>`).join('');

    // Full expanded card list
    const expandedHTML=indices.map(i=>{
      const c=coll[i];
      const g=c.paid?c.avg-c.paid:null;
      const gh=g!==null?`<div class="cig ${g>=0?'up':'dn'}">${g>=0?'↑':'↓'} ${fP(Math.abs(g))}</div>`:'';
      const ph=c.paid?`<div class="cipa">paid ${fP(c.paid)}</div>`:'';
      const th=c.imageUrl?`<img class="cith" src="${c.imageUrl}" onerror="this.style.display='none'"/>`:`<div class="cith"></div>`;
      return`<div class="ci">${th}<div class="cii"><div class="cin">${escH(c.name)}</div><div class="cim">${c.grade}${c.lang!=='English'?' · '+c.lang:''}</div></div><div class="cip"><div class="civ">${fP(c.avg)}</div>${ph}${gh}</div><button class="cdel" onclick="delColl(${i})">×</button></div>`;
    }).join('');

    return`<div class="tcg-group" id="grp-${gk}">
      <div class="tcg-group-header" onclick="toggleGroup('${gk}')">
        <div class="tcg-group-left">
          <div class="tcg-icon" style="background:${gv.color}22;border:1px solid ${gv.color}44">${gv.icon}</div>
          <div>
            <div class="tcg-group-name">${gv.label}</div>
            <div class="tcg-group-sub">${cards.length} card${cards.length!==1?'s':''}</div>
          </div>
        </div>
        <div class="tcg-group-right">
          <div class="tcg-group-val">${fP(groupVal)}</div>
          ${gainHTML}
        </div>
      </div>
      <div class="tcg-divider"></div>
      <div class="tcg-top3">
        <div class="tcg-top3-label">Top 3 by value</div>
        <div class="tcg-top3-cards">${top3HTML}</div>
      </div>
      <button class="tcg-see-all" onclick="toggleGroup('${gk}')">See all ${cards.length} cards ▾</button>
      <div class="tcg-expanded" id="exp-${gk}">${expandedHTML}</div>
    </div>`;
  }).join('');
}

function toggleGroup(gk){
  const el=document.getElementById('exp-'+gk);
  const btn=document.querySelector(`#grp-${gk} .tcg-see-all`);
  const open=el.classList.toggle('open');
  const count=document.querySelectorAll(`#exp-${gk} .ci`).length;
  if(btn)btn.textContent=open?`Hide cards ▴`:`See all ${count} cards ▾`;
}

function delColl(i){coll.splice(i,1);saveColl();renderColl();}

// MODAL
function promptAdd(data){
  const card=typeof data==='string'?JSON.parse(data.replace(/&quot;/g,'"')):data;
  pending=card;
  document.getElementById('mtitle').textContent=(card.name||'').slice(0,38);
  document.getElementById('mpaid').value='';
  document.getElementById('modal').style.display='flex';
  setTimeout(()=>document.getElementById('mpaid').focus(),80);
}
function closeModal(save){
  const paid=save?parseFloat(document.getElementById('mpaid').value)||0:0;
  document.getElementById('modal').style.display='none';
  if(pending){
    coll.unshift({...pending,paid:paid||null,added:Date.now()});
    saveColl();
    const btn=document.querySelector('.acb');
    if(btn){btn.textContent='✓ Added to collection';btn.style.color='var(--gn)';btn.style.borderColor='var(--gn)';setTimeout(()=>{btn.textContent='+ Add to collection';btn.style.color='';btn.style.borderColor='';},2200);}
    pending=null;
  }
}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal(false);});

// COLLECTION SCAN
async function startCollScan(){
  document.getElementById('coll-scan-section').style.display='block';
  collN=0;updCSC();
  try{
    collStream=await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'}});
    document.getElementById('cv').srcObject=collStream;
    runScanLoop();
  }catch(e){alert('Camera unavailable. Use manual add below.');}
}
function stopCollScan(){
  if(collStream){collStream.getTracks().forEach(t=>t.stop());collStream=null;}
  document.getElementById('coll-scan-section').style.display='none';
  collN=0;
}
function updCSC(){document.getElementById('csct').textContent=collN+' card'+(collN!==1?'s':'')+' scanned';}
function setCSS(m){const e=document.getElementById('csst');if(e)e.textContent=m;}
function runScanLoop(){
  if(!collStream)return;
  setCSS('HOLD CARD IN FRAME');
  setTimeout(()=>{
    if(!collStream)return;
    setCSS('SCANNING…');
    setTimeout(()=>{
      if(!collStream)return;
      // Production: replace with ZXing barcode decode or Tesseract OCR on video frame
      const mock=[
        {name:'Charizard Base Set Holo 1st Ed',grade:'Raw',cond:'NM-MT',lang:'English',ct:'tcg'},
        {name:'Pikachu Illustrator CGC 9',grade:'Raw',cond:'NM',lang:'Japanese',ct:'tcg'},
        {name:'Mewtwo Base Set Holo',grade:'PSA 9',cond:'Any',lang:'English',ct:'tcg'},
        {name:'Dragon Ball Heroes BM-001 SR',grade:'Raw',cond:'NM',lang:'Japanese',ct:'dbs'},
        {name:'Dragon Ball Fusion World BT-01',grade:'Raw',cond:'NM-MT',lang:'English',ct:'dbs'},
        {name:'Goku Ultra Instinct SP',grade:'PSA 10',cond:'Any',lang:'Japanese',ct:'dbs'},
        {name:'Gundam RX-78-2 MS-01 SR',grade:'Raw',cond:'NM',lang:'Japanese',ct:'tcg'},
        {name:'Gundam Wing Zero MS-07 R',grade:'Raw',cond:'NM-MT',lang:'English',ct:'tcg'},
        {name:'Blue-Eyes White Dragon LOB',grade:'Raw',cond:'EX',lang:'English',ct:'tcg'},
        {name:'Dark Magician MRD Ultra Rare',grade:'PSA 9',cond:'Any',lang:'English',ct:'tcg'},
        {name:'Black Lotus Alpha MTG',grade:'Raw',cond:'VG',lang:'English',ct:'tcg'},
        {name:'Luffy OP-01 Leader Rare',grade:'Raw',cond:'NM',lang:'Japanese',ct:'tcg'},
        {name:'2003 Topps Chrome Tom Brady RC',grade:'Raw',cond:'NM',lang:'English',ct:'sr'},
        {name:'2018 Prizm Luka Doncic RC',grade:'PSA 9',cond:'Any',lang:'English',ct:'sg'},
      ];
      const card=mock[Math.floor(Math.random()*mock.length)];
      setCSS('CARD FOUND — PRICING…');
      const r=price(card.name,card.grade,card.cond,card.lang);
      coll.unshift({name:card.name,grade:card.grade,cond:card.cond,lang:card.lang,ct:card.ct,avg:r.avg,lo:r.lo,hi:r.hi,imageUrl:r.img,paid:null,added:Date.now()});
      saveColl();collN++;updCSC();renderColl();
      setCSS('ADDED ✓ — NEXT CARD');
      setTimeout(()=>{if(collStream)runScanLoop();},1500);
    },700+Math.random()*500);
  },2200+Math.random()*1500);
}
function addManual(){
  const q=document.getElementById('cmi').value.trim();if(!q)return;
  document.getElementById('cmi').value='';
  const r=price(q,'Raw','Any','English');
  promptAdd({name:q,grade:'Raw',cond:'Any',lang:'English',ct:r.ct,avg:r.avg,lo:r.lo,hi:r.hi,imageUrl:r.img});
}
function showHint(){
  if(hintShown)return;hintShown=true;
  document.getElementById('sr').innerHTML=`<div style="background:rgba(232,255,71,.06);border:1px solid rgba(232,255,71,.2);border-radius:9px;padding:11px 13px;font-family:monospace;font-size:10px;color:var(--mu);line-height:1.6">Search any card, then tap <strong style="color:var(--ac)">+ Add to collection</strong> in the result.</div>`;
}
function exportCSV(){
  if(!coll.length){alert('No cards in collection yet.');return;}
  const rows=[['Name','Grade','Condition','Language','Market Value','Paid','Gain/Loss','Date Added']];
  coll.forEach(c=>{
    const gain=c.paid?(c.avg-c.paid).toFixed(2):'';
    rows.push(['"'+c.name.replace(/"/g,'""')+'"',c.grade,c.cond,c.lang,c.avg.toFixed(2),c.paid?c.paid.toFixed(2):'',gain,new Date(c.added).toLocaleDateString()]);
  });
  const csv=rows.map(r=>r.join(',')).join('\n');
  const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'}));a.download='cardpulse-collection.csv';a.click();
}
</script>
